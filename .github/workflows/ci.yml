name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build -o explorer ./cmd/explorer

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run tsc

      - name: Build
        run: npm run build

  # Build preview binaries for PRs
  preview:
    name: Preview Build
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    needs: [backend, frontend]
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: radar-macOS-arm64
          - os: macos-13
            goos: darwin
            goarch: amd64
            artifact: radar-macOS-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: radar-linux-amd64
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web && npm ci && npm run build
          mkdir -p ../internal/static/dist
          cp -r dist/* ../internal/static/dist/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="pr-${{ github.event.pull_request.number }}"
          go build -ldflags "-X main.version=${VERSION}" -o ${{ matrix.artifact }} ./cmd/explorer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 7

  # Post comment with preview instructions
  preview-comment:
    name: Preview Comment
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [preview]
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const runId = context.runId;
            const repo = context.repo;

            const body = `## 🚀 Preview Build Ready

            Download and run this PR's build:

            \`\`\`bash
            # macOS (Apple Silicon)
            gh run download ${runId} -n radar-macOS-arm64 && chmod +x radar-macOS-arm64 && ./radar-macOS-arm64

            # macOS (Intel)
            gh run download ${runId} -n radar-macOS-amd64 && chmod +x radar-macOS-amd64 && ./radar-macOS-amd64

            # Linux
            gh run download ${runId} -n radar-linux-amd64 && chmod +x radar-linux-amd64 && ./radar-linux-amd64
            \`\`\`

            Or use the preview script:
            \`\`\`bash
            bash scripts/preview.sh ${prNumber}
            \`\`\`
            `;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview Build Ready')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: repo.owner,
                repo: repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: prNumber,
                body: body,
              });
            }
