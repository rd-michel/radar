name: Docker Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. auth-test, my-feature)'
        required: true

permissions:
  contents: read
  packages: write

env:
  DOCKER_REPO: ghcr.io/skyhook-io/radar

jobs:
  docker:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          target: full
          push: true
          build-args: |
            VERSION=${{ github.event.inputs.tag }}
          tags: ${{ env.DOCKER_REPO }}:${{ github.event.inputs.tag }}
